<script type="text/babel" data-presets="react-classic">
const { useState, useEffect, useCallback, useMemo } = React;
// ─── Utils ────────────────────────────────────────────────────────────────
function generateId(prefix = 'id') {
return `${prefix}_${Date.now()}_${Math.random().toString(36).substr(2, 6)}`;
}
// ─── XLSX helpers (SheetJS) ───────────────────────────────────────────────
function parseXLSX(arrayBuffer) {
const wb = XLSX.read(arrayBuffer, { type: 'array' });
const ws = wb.Sheets[wb.SheetNames[0]];
const rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '' });
if (rows.length < 2) throw new Error('Ficheiro vazio ou sem dados.');
const header = rows[0].map(h => String(h).trim().toUpperCase());
const colIdx = (names) => {
for (const n of names) {
const i = header.findIndex(h => h.includes(n));
if (i >= 0) return i;
}
return -1;
};
const iCodigo    = colIdx(['COD']);
const iArtigo    = colIdx(['ARTIGO', 'DESCRI', 'NOME']);
const iTipo      = colIdx(['TIPO', 'CATEG', 'FAMILIA']);
const iCor       = colIdx(['COR', 'COLOR']);
const iQtd       = colIdx(['QUANT', 'QTD', 'STOCK', 'QT']);
const iLoc       = colIdx(['LOCAL', 'POSICAO', 'POSI', 'ARMAZEM']);
const warnings = [];
[
[iCodigo, 'Código', 'coluna A'],
[iArtigo, 'Artigo/descrição', 'coluna B'],
[iTipo, 'Tipo/categoria', 'coluna C'],
[iCor, 'Cor', 'coluna D'],
[iQtd, 'Quantidade/stock', 'coluna E'],
].forEach(([idx, label, fallback]) => {
if (idx < 0) warnings.push(`${label} não encontrado no cabeçalho; usada ${fallback}.`);
});
const ci = iCodigo >= 0 ? iCodigo : 0;
const ca = iArtigo >= 0 ? iArtigo : 1;
const ct = iTipo   >= 0 ? iTipo   : 2;
const cc = iCor    >= 0 ? iCor    : 3;
const cq = iQtd    >= 0 ? iQtd    : 4;
const cl = iLoc    >= 0 ? iLoc    : -1;
const artigos = [];
const codigosVistos = new Set();
let ignoredRows = 0;
let duplicateRows = 0;
let invalidQuantityRows = 0;
for (let i = 1; i < rows.length; i++) {
const row = rows[i];
const codigo = String(row[ci] ?? '').trim();
if (!codigo) { ignoredRows++; continue; }
if (codigosVistos.has(codigo)) { ignoredRows++; duplicateRows++; continue; }
codigosVistos.add(codigo);
const quantidadeRaw = row[cq];
const quantidade = parseInt(quantidadeRaw);
if (String(quantidadeRaw ?? '').trim() !== '' && Number.isNaN(quantidade)) invalidQuantityRows++;
artigos.push({
codigo,
artigo:    String(row[ca] ?? '').trim(),
tipo:      String(row[ct] ?? '').trim(),
cor:       String(row[cc] ?? '').trim(),
quantidade: Number.isNaN(quantidade) ? 0 : quantidade,
localizacao: cl >= 0 ? String(row[cl] ?? '').trim() : '',
});
}
if (duplicateRows > 0) warnings.push(`${duplicateRows} linha(s) duplicada(s) foram ignorada(s).`);
if (invalidQuantityRows > 0) warnings.push(`${invalidQuantityRows} linha(s) tinham quantidade inválida e foram tratadas como 0.`);
return {
artigos,
summary: {
importedRows: artigos.length,
ignoredRows,
totalRows: Math.max(rows.length - 1, 0),
warnings,
},
};
}
async function saveWorkbookWithPicker(wb, suggestedName) {
const wbArray = XLSX.write(wb, { bookType: 'xlsx', type: 'array' });
const blob = new Blob([wbArray], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
if (window.showSaveFilePicker) {
try {
const handle = await window.showSaveFilePicker({
suggestedName,
types: [{
description: 'Folha de cálculo Excel',
accept: { 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet': ['.xlsx'] },
}],
});
const writable = await handle.createWritable();
await writable.write(blob);
await writable.close();
return true;
} catch (err) {
if (err.name === 'AbortError') return false;
}
}
const url = URL.createObjectURL(blob);
const a = document.createElement('a');
a.href = url;
a.download = suggestedName;
a.click();
URL.revokeObjectURL(url);
return true;
}
async function exportXLSX(artigos) {
const wb = XLSX.utils.book_new();
const invData = [
['CODIGO', 'ARTIGO', 'TIPO', 'COR', 'QUANTIDADE', 'LOCALIZACAO'],
...artigos.map(a => [a.codigo, a.artigo, a.tipo, a.cor, a.quantidade, a.localizacao || ''])
];
const wsInv = XLSX.utils.aoa_to_sheet(invData);
wsInv['!cols'] = [
{ wch: 16 }, { wch: 36 }, { wch: 18 }, { wch: 16 }, { wch: 14 }, { wch: 14 }
];
XLSX.utils.book_append_sheet(wb, wsInv, 'Inventário');
const total = artigos.length;
const semStock = artigos.filter(a => a.quantidade === 0).length;
const baixo = artigos.filter(a => a.quantidade > 0 && a.quantidade <= 10).length;
const totalUnid = artigos.reduce((s, a) => s + a.quantidade, 0);
const resumoData = [
['RESUMO DO INVENTÁRIO', ''],
['Data de exportação', new Date().toLocaleDateString('pt-PT')],
['', ''],
['Total de referências', total],
['Total de unidades', totalUnid],
['Artigos sem stock', semStock],
['Artigos com stock baixo (≤10)', baixo],
];
const wsRes = XLSX.utils.aoa_to_sheet(resumoData);
wsRes['!cols'] = [{ wch: 30 }, { wch: 20 }];
XLSX.utils.book_append_sheet(wb, wsRes, 'Resumo');
const fileName = 'inventario_' + new Date().toISOString().split('T')[0] + '.xlsx';
return await saveWorkbookWithPicker(wb, fileName);
}
// ─── Storage ──────────────────────────────────────────────────────────────
const STORAGE_LIMIT = 4.5 * 1024 * 1024;
function loadFromStorage() {
try {
return {
artigos:    JSON.parse(localStorage.getItem('inv_artigos')    || '[]'),
movimentos: JSON.parse(localStorage.getItem('inv_movimentos') || '[]'),
servicos:   JSON.parse(localStorage.getItem('inv_servicos')   || '[]'),
};
} catch {
return { artigos: [], movimentos: [], servicos: [] };
}
}
function saveToStorage(artigos, movimentos) {
const aStr = JSON.stringify(artigos);

const PAGE_SIZE = 50;
function InventarioTab({ artigos, searchTerm, setSearchTerm, filterCor, setFilterCor, coresUnicas, filterTipo, setFilterTipo, tiposUnicos, onAddMovimento, onNovoArtigo, onEliminarArtigo, onExportar, setMostrarFolhaInventario, onMostrarIndice, isBusy, operationType, onEditarLocalizacao, onImprimirEtiqueta, selEtiquetas, setSelEtiquetas, onImprimirSeleccionadas, onScan }) {
const [sortKey, setSortKey] = useState('codigo');
const [sortDir, setSortDir] = useState('asc');
const [page, setPage] = useState(1);
function toggleSort(key) {
if (sortKey === key) setSortDir(d => d === 'asc' ? 'desc' : 'asc');
else { setSortKey(key); setSortDir('asc'); }
setPage(1);
}
const sorted = useMemo(() => [...artigos].sort((a, b) => {
if (sortKey === 'quantidade') return sortDir === 'asc' ? a.quantidade - b.quantidade : b.quantidade - a.quantidade;
return sortDir === 'asc'
? String(a[sortKey]).localeCompare(String(b[sortKey]))
: String(b[sortKey]).localeCompare(String(a[sortKey]));
}), [artigos, sortKey, sortDir]);
const totalPages = Math.ceil(sorted.length / PAGE_SIZE);
const paged = sorted.slice((page - 1) * PAGE_SIZE, page * PAGE_SIZE);
const pagedIds = paged.map(a => a.id);
const allSelected = pagedIds.length > 0 && pagedIds.every(id => selEtiquetas.has(id));
function toggleAll() {
setSelEtiquetas(prev => {
const next = new Set(prev);
if (allSelected) pagedIds.forEach(id => next.delete(id));
else pagedIds.forEach(id => next.add(id));
return next;
});
}
function toggleOne(id) {
setSelEtiquetas(prev => {
const next = new Set(prev);
if (next.has(id)) next.delete(id); else next.add(id);
return next;
});

function SortTh({ label, k }) {
const active = sortKey === k;
return (
<th className="px-4 py-3 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider">
<button className={`flex items-center gap-1 hover:text-blue-700 ${active ? 'text-blue-700' : ''}`} onClick={() => toggleSort(k)}>
{label}
<span className="flex flex-col">
<span className={active && sortDir === 'asc' ? 'text-blue-600' : 'opacity-30'}><Icons.ChevronUp /></span>
<span className={active && sortDir === 'desc' ? 'text-blue-600' : 'opacity-30'}><Icons.ChevronDown /></span>
</span>
</button>
</th>
);

// ─── Autocomplete Origem/Destino ──────────────────────────────────────────
function ServicoAutocomplete({ value, onChange, servicos, label }) {
const [query, setQuery] = React.useState(value || '');
const [open, setOpen] = React.useState(false);
const [highlighted, setHighlighted] = React.useState(0);
const wrapperRef = React.useRef(null);
React.useEffect(() => { setQuery(value || ''); }, [value]);
const filtered = React.useMemo(() => {
if (!query.trim() || servicos.length === 0) return [];
const q = query.toLowerCase();
return servicos.filter(s =>
s.cod.toLowerCase().includes(q) || s.descricao.toLowerCase().includes(q)
).slice(0, 8);
}, [query, servicos]);
React.useEffect(() => {
function handleClick(e) {
if (wrapperRef.current && !wrapperRef.current.contains(e.target)) setOpen(false);
}
document.addEventListener('mousedown', handleClick);
return () => document.removeEventListener('mousedown', handleClick);
}, []);
function select(s) {
const val = `${s.cod} — ${s.descricao}`;
setQuery(val);
onChange(val);
setOpen(false);
}
function handleKey(e) {
if (!open || filtered.length === 0) return;
if (e.key === 'ArrowDown') { e.preventDefault(); setHighlighted(h => Math.min(h + 1, filtered.length - 1)); }
else if (e.key === 'ArrowUp') { e.preventDefault(); setHighlighted(h => Math.max(h - 1, 0)); }
else if (e.key === 'Enter') { e.preventDefault(); select(filtered[highlighted]); }
else if (e.key === 'Escape') setOpen(false);
}
return (
<div ref={wrapperRef} className="relative">
<label className="block text-xs font-semibold mb-1 text-gray-700 uppercase tracking-wide">
{label}
{servicos.length > 0 && <span className="ml-2 text-gray-400 font-normal normal-case">{servicos.length} serviços</span>}
</label>
<input
type="text"
value={query}
placeholder={servicos.length > 0 ? 'Pesquisar por código ou descrição...' : 'Ex: Loja A'}
onChange={e => { setQuery(e.target.value); onChange(e.target.value); setOpen(true); setHighlighted(0); }}
onFocus={() => { if (query) setOpen(true); }}
onKeyDown={handleKey}
className="w-full px-3 py-2.5 border rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none text-sm"
/>
{open && filtered.length > 0 && (
<div className="absolute z-50 w-full mt-1 bg-white border rounded-xl shadow-xl overflow-hidden">
{filtered.map((s, i) => (
<button key={s.cod} type="button"
onMouseDown={() => select(s)}
onMouseEnter={() => setHighlighted(i)}
className={`w-full text-left px-3 py-2.5 flex flex-col gap-0.5 border-b last:border-0 transition-colors ${i === highlighted ? 'bg-blue-50' : 'hover:bg-gray-50'}`}>
<div className="flex items-center gap-2">
<span className="mono text-xs font-semibold text-blue-700 shrink-0">{s.cod}</span>
{s.local && <span className="text-xs text-gray-400 bg-gray-100 px-1.5 py-0.5 rounded">{s.local}</span>}
{s.kaizen && <span className="text-xs text-amber-600 bg-amber-50 px-1.5 py-0.5 rounded">{s.kaizen}</span>}
</div>
<span className="text-sm text-gray-700 leading-tight">{s.descricao}</span>
</button>
))}
</div>
)}
</div>
);
}

const corA = (a.cor || '').toLowerCase();
const corB = (b.cor || '').toLowerCase();
if (corA !== corB) return corA.localeCompare(corB);
const tipoA = (a.tipo || '').toLowerCase();
const tipoB = (b.tipo || '').toLowerCase();
if (tipoA !== tipoB) return tipoA.localeCompare(tipoB);

function ImportMovimentosPreviewModal({ movimentos: parsedMovs, summary, artigos, movimentosExistentes, onConfirm, onCancel }) {
const [datasCorrigidas, setDatasCorrigidas] = useState({});
const datasInvalidas = summary.datasInvalidas || [];
const { enc, naoEnc, dups } = useMemo(() => {
const artigosMap = {};
artigos.forEach(a => { artigosMap[a.codigo.toLowerCase()] = a; });
const existingSet = new Set(
movimentosExistentes.map(m => `${m.codigo}|${m.tipo}|${m.quantidade}|${m.data}`)
);
const enc = [], naoEnc = [], dups = [];
parsedMovs.forEach(m => {
const key = `${m.codigo}|${m.tipo}|${m.quantidade}|${m.data}`;
if (existingSet.has(key)) { dups.push(m); return; }
const artigo = artigosMap[m.codigo.toLowerCase()];
if (artigo) enc.push({ ...m, artigoId: artigo.id, artigo: m.artigo || artigo.artigo });
else naoEnc.push(m);
});
return { enc, naoEnc, dups };
}, [parsedMovs, artigos, movimentosExistentes]);
// Movimentos reconstruídos a partir de linhas com data inválida, após correcção pelo utilizador
const encCorrigidos = useMemo(() => {
const artigosMap = {};
artigos.forEach(a => { artigosMap[a.codigo.toLowerCase()] = a; });
const resultado = [];
datasInvalidas.forEach(d => {
const dataCorrigida = datasCorrigidas[d.linha]?.trim();
if (!dataCorrigida) return; // utilizador ainda não corrigiu
if (!d.tipo || !d.quantidade) return; // linha inválida mesmo com data
const artigo = artigosMap[d.codigo.toLowerCase()];
if (!artigo) return; // código não existe no inventário
resultado.push({
codigo: d.codigo,
artigo: d.artigo || artigo.artigo,
tipo: d.tipo,
quantidade: d.quantidade,
data: dataCorrigida,
destino: d.destino || '',
observacoes: d.observacoes || '',
artigoId: artigo.id,
});
});
return resultado;
}, [datasInvalidas, datasCorrigidas, artigos]);
const totalAImportar = enc.length + encCorrigidos.length;
return (
<div className="fixed inset-0 bg-black/50 flex items-center justify-center p-4 z-50">
<div className="modal-enter bg-white rounded-xl max-w-lg w-full p-6 shadow-xl max-h-[90vh] flex flex-col">

function ScannerModal({ onDetected, onClose, titulo = 'Ler código' }) {
const videoRef = React.useRef(null);
const [erro, setErro] = React.useState('');
const [pronto, setPronto] = React.useState(false);
const readerRef = React.useRef(null);
const activeRef = React.useRef(true);

function bip() {
try {
const ctx = new (window.AudioContext || window.webkitAudioContext)();
const osc = ctx.createOscillator();
const gain = ctx.createGain();
osc.connect(gain);
gain.connect(ctx.destination);
osc.frequency.value = 1200;
osc.type = 'sine';
gain.gain.setValueAtTime(0.3, ctx.currentTime);
gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.18);
osc.start(ctx.currentTime);
osc.stop(ctx.currentTime + 0.18);
} catch {}
}

React.useEffect(() => {
activeRef.current = true;
if (typeof ZXing === 'undefined') {
setErro('Biblioteca ZXing não carregada. Verifique a ligação à internet.');
return;
}
const hints = new Map();
const formats = [
ZXing.BarcodeFormat.CODE_128,
ZXing.BarcodeFormat.CODE_39,
ZXing.BarcodeFormat.EAN_13,
ZXing.BarcodeFormat.EAN_8,
ZXing.BarcodeFormat.QR_CODE,
ZXing.BarcodeFormat.DATA_MATRIX,
];
hints.set(ZXing.DecodeHintType.POSSIBLE_FORMATS, formats);
hints.set(ZXing.DecodeHintType.TRY_HARDER, true);
const reader = new ZXing.BrowserMultiFormatReader(hints);
readerRef.current = reader;

reader.decodeFromConstraints(
{ video: { facingMode: { ideal: 'environment' }, width: { ideal: 1280 }, height: { ideal: 720 } } },
videoRef.current,
(result, err) => {
if (!activeRef.current) return;
if (result) {
bip();
activeRef.current = false;
reader.reset();
onDetected(result.getText());
}
// erros de frame são normais, ignorar
}
).then(() => {
setPronto(true);
}).catch(e => {
if (!activeRef.current) return;
if (e && e.name === 'NotAllowedError') {
setErro('Acesso à câmara negado. Active a permissão de câmara nas definições do browser.');
} else if (e && e.name === 'NotFoundError') {
setErro('Câmara não encontrada neste dispositivo.');
} else {
setErro('Erro ao iniciar câmara: ' + (e?.message || String(e)));
}
});

return () => {
activeRef.current = false;
try { readerRef.current?.reset(); } catch {}
};
}, []);

return (
<div className="fixed inset-0 bg-black/80 flex flex-col items-center justify-center z-[60]">
<div className="w-full max-w-sm mx-auto flex flex-col" style={{ maxHeight: '100dvh' }}>
{/* Header */}
<div className="flex justify-between items-center px-4 py-3 bg-gray-900 text-white rounded-t-xl">
<span className="font-semibold text-sm flex items-center gap-2">
<svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
<path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z" />
</svg>
{titulo}
</span>
<button onClick={onClose} className="text-gray-300 hover:text-white p-1"><Icons.X /></button>
</div>
{/* Viewfinder */}
<div className="relative bg-black" style={{ aspectRatio: '4/3' }}>
<video ref={videoRef} className="w-full h-full object-cover" playsInline muted autoPlay />
{/* Mira de scan */}
{pronto && !erro && (
<div className="absolute inset-0 flex items-center justify-center pointer-events-none">
<div className="relative w-48 h-32">
{/* Cantos da mira */}
<span className="absolute top-0 left-0 w-6 h-6 border-t-2 border-l-2 border-green-400 rounded-tl" />
<span className="absolute top-0 right-0 w-6 h-6 border-t-2 border-r-2 border-green-400 rounded-tr" />
<span className="absolute bottom-0 left-0 w-6 h-6 border-b-2 border-l-2 border-green-400 rounded-bl" />
<span className="absolute bottom-0 right-0 w-6 h-6 border-b-2 border-r-2 border-green-400 rounded-br" />
{/* Linha de scan animada */}
<span className="absolute left-2 right-2 h-0.5 bg-green-400/80 rounded-full" style={{ animation: 'scanLine 1.8s ease-in-out infinite', top: '50%' }} />
</div>
</div>
)}
{/* Estado a carregar */}
{!pronto && !erro && (
<div className="absolute inset-0 flex flex-col items-center justify-center bg-black/60 text-white gap-2">
<span className="w-6 h-6 border-2 border-white/30 border-t-white rounded-full animate-spin" />
<span className="text-xs">A iniciar câmara...</span>
</div>
)}
</div>
{/* Footer */}
<div className="bg-gray-900 text-white px-4 py-3 rounded-b-xl">
{erro ? (
<p className="text-red-400 text-xs flex items-start gap-2">
<Icons.AlertTriangle />
<span>{erro}</span>
</p>
) : (
<p className="text-gray-400 text-xs text-center">Aponte para um código de barras ou QR Code</p>
)}
<button onClick={onClose}
className="mt-3 w-full py-2.5 border border-gray-600 rounded-lg text-sm text-gray-300 hover:bg-gray-800 transition-colors">
Cancelar
</button>
</div>
</div>
<style>{`
@keyframes scanLine {
0%, 100% { top: 20%; opacity: 0.6; }
50% { top: 75%; opacity: 1; }
}
`}</style>
</div>
);
}

});

const fileName = 'copia_seguranca_inventario_v1_' + new Date().toISOString().split('T')[0] + '.json';
const saved = await saveJSONWithPicker(payload, fileName);

recordBackupDone();
setBannerBackupDismissed(true);
toast(`Cópia de segurança exportada: ${artigos.length} artigo(s), ${movimentos.length} movimento(s), ${servicos.length} serviço(s).`);

function handleBackupRestore(e) {
if (isLoading) return;
const file = e.target.files[0];
if (!file) return;
e.target.value = '';
if (!file.name.match(/\.json$/i)) {
toast('Por favor seleccione uma cópia de segurança .json', 'error');
return;
}
setOperation({ type: 'restore-backup', message: 'A ler cópia de segurança...', detail: file.name });
const reader = new FileReader();
reader.onload = (ev) => {
try {
const backup = parseBackupJSON(ev.target.result);
const dataBackup = backup.exportedAt
? new Date(backup.exportedAt).toLocaleString('pt-PT')
: 'data desconhecida';
setConfirm({
title: 'Restaurar cópia de segurança',
message: `Esta acção vai substituir o estado actual da app por uma cópia de segurança v${BACKUP_VERSION}.\nConteúdo a restaurar:\n• ${backup.artigos.length} artigo(s)\n• ${backup.movimentos.length} movimento(s)\n• ${backup.servicos.length} serviço(s)\n• Exportada em: ${dataBackup}\nOs dados v1 ficam guardados apenas no dispositivo e navegador actuais. Confirme que quer continuar.`,
confirmLabel: 'Restaurar',
danger: true,
onConfirm: () => {
try {
saveCompleteStorage(backup.artigos, backup.movimentos, backup.servicos);
setArtigos(backup.artigos);
setMovimentos(backup.movimentos);
setServicos(backup.servicos);
recordBackupDone();
recordMovimentosExported(backup.movimentos.length);
setBannerBackupDismissed(true);
setConfirm(null);
setActiveTab('dashboard');
toast(`Cópia de segurança restaurada: ${backup.artigos.length} artigo(s), ${backup.movimentos.length} movimento(s), ${backup.servicos.length} serviço(s).`);
} catch (err) {
if (err.message === 'QUOTA') toast('Limite de armazenamento atingido. A cópia de segurança é demasiado grande para este navegador.', 'error');
else toast('Erro ao restaurar cópia de segurança: ' + err.message, 'error');
}
},
onCancel: () => setConfirm(null),
});
} catch (err) {
toast('Erro ao validar cópia de segurança: ' + err.message, 'error');
} finally {
setOperation(null);
}
};
reader.onerror = () => { toast('Erro ao ler cópia de segurança.', 'error'); setOperation(null); };
reader.readAsText(file);
}

});
}

[...new Set(artigos.map(a => a.cor).filter(Boolean))].sort(),
