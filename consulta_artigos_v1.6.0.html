<!DOCTYPE html>
<html lang="pt">
<head>
<!--
  Consulta de Artigos — v1.6.0
  Semantic Versioning (https://semver.org)

  Changelog:
  v1.6.0 (atual)
    - feat: a pesquisa deixa de ser uma única caixa "tudo em um" — passa a
      haver dois botões, "Artigos" e "Supermercados / Serviços", cada um
      com a sua caixa de texto. Só uma caixa está visível de cada vez; ao
      trocar de botão, o texto e os resultados anteriores são limpos
  v1.5.0
    - feat: depois de carregar os dois ficheiros, a zona de upload deixa de
      ocupar espaço no ecrã — colapsa numa barra fina com um link "Trocar
      ficheiros" para reabrir o upload sem perder os dados já carregados
  v1.4.2
    - chore: número da versão passa a constar também na meta description
      do ficheiro (tag <meta name="description">), além do título e do
      cabeçalho, para ser visível em partilhas de link e no separador
      "Ver código fonte"
  v1.4.1
    - change: a pesquisa só arranca a partir de 2 caracteres (com 1 só
      carácter, em milhares de linhas, devolvia demasiados resultados para
      ser útil e parecia "não estar a funcionar")
    - perf: pequeno atraso (150ms) antes de pesquisar depois de cada tecla,
      para não recalcular a cada milissegundo ao escrever depressa
    - fix: aviso "mostrando os primeiros 30" só aparecia quando havia
      exatamente 30 resultados; agora aparece sempre que há mais de 30
  v1.4.0
    - feat: pesquisa passa a encontrar também por Serviço (código ou
      descrição), coluna existente no ficheiro real de supermercados mas
      que ainda não era lida
    - feat: nova secção "Serviços" na ficha do artigo, para se perceber
      porque é que um resultado apareceu ao pesquisar por serviço
  v1.3.2
    - fix: pesquisa por supermercado passa a ignorar acentos (ex: "Povoa"
      encontra "Póvoa"), tornando-a mais fiável
  v1.3.1
    - change: tipos de caixa (cartão de resumo e secção "Caixas por
      supermercado") passam a aparecer por ordem alfabética
    - change: secção "Caixas por supermercado" passa a aparecer acima de
      "Supermercados" na ficha do artigo
    - feat: a pesquisa passa a encontrar também por supermercado (código ou
      descrição), além de código/descrição do artigo
  v1.3.0
    - change: cartão "Supermercados com artigo" mostra agora quantos são HPH
      e quantos são ACES, em vez da lista de nomes
    - change: cartão "Tipos de caixa" mostra apenas os tipos existentes
      (sem quantidades)
    - change: secção "Caixas por supermercado" passou a agrupar por HPH/ACES,
      mostrando o tipo de caixa e a quantidade máxima de cada grupo, em vez
      de uma linha por supermercado
  v1.2.0
    - feat: painel "Informação importante" em cada artigo com resumo rápido
      (nº de supermercados, tipos de caixa com quantidade máxima, maior
      total por supermercado)
    - feat: supermercados agrupados por "Local" (HPH / ACES), lido da coluna
      "Local" do ficheiro de supermercados
    - chore: nomes dos ficheiros no ecrã de upload atualizados para
      "T_supermercados" e "Consumo" (apenas o texto mostrado; estrutura de
      colunas não mudou)
  v1.1.0
    - fix: correção de correspondência de colunas ("Artigo" deixou de apanhar
      "Código Artigo"; "Supermercado" deixou de apanhar "Código Supermercado")
    - feat: quantidade máxima por tipo de caixa (quando há linhas duplicadas
      para o mesmo tipo de caixa + supermercado, mantém-se a de maior total)
    - feat: total agregado por supermercado (soma dos máximos de cada tipo
      de caixa), mostrado como resumo na ficha do artigo
  v1.0.1
    - versão inicial
-->
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Consulta de Artigos — v1.6.0</title>
<meta name="description" content="Consulta de Artigos v1.6.0 — aplicação para consultar armazém, posição, supermercados e caixas a partir dos ficheiros T_supermercados e Consumo.">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  :root {
    --bg: #f5f4f0;
    --surface: #ffffff;
    --surface2: #f0efe9;
    --border: #e2e0d8;
    --border2: #cac8be;
    --text: #1a1916;
    --text2: #6b6960;
    --text3: #a09e96;
    --blue-bg: #e8f0fb;
    --blue-txt: #1a4fa0;
    --green-bg: #e4f3e8;
    --green-txt: #1a6632;
    --amber-bg: #fef3db;
    --amber-txt: #8a5a00;
    --red-bg: #fde8e8;
    --red-txt: #991818;
    --radius: 10px;
    --radius-sm: 6px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  /* HEADER */
  header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 2rem; display: flex; align-items: center; gap: 16px; height: 56px; position: sticky; top: 0; z-index: 100; }
  header h1 { font-size: 16px; font-weight: 600; color: var(--text); }
  header .sep { width: 1px; height: 20px; background: var(--border); }
  header .subtitle { font-size: 13px; color: var(--text2); }
  .version { font-size: 11px; background: var(--surface2); border: 1px solid var(--border); border-radius: 99px; padding: 2px 9px; color: var(--text2); margin-left: auto; }

  /* LAYOUT */
  .container { max-width: 900px; margin: 0 auto; padding: 2rem 1.5rem; }

  /* UPLOAD SECTION */
  .upload-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 1.5rem; }
  .upload-card { background: var(--surface); border: 1.5px dashed var(--border2); border-radius: var(--radius); padding: 1.5rem; text-align: center; cursor: pointer; transition: border-color 0.15s, background 0.15s; }
  .upload-card:hover { border-color: var(--blue-txt); background: var(--blue-bg); }
  .upload-card.loaded { border-style: solid; border-color: #1a6632; background: var(--green-bg); cursor: default; }
  .upload-card svg { width: 32px; height: 32px; color: var(--text3); margin-bottom: 8px; }
  .upload-card.loaded svg { color: var(--green-txt); }
  .upload-card .uc-title { font-size: 13px; font-weight: 600; color: var(--text); }
  .upload-card .uc-sub { font-size: 12px; color: var(--text2); margin-top: 2px; }
  .upload-card .uc-count { font-size: 12px; color: var(--green-txt); font-weight: 500; margin-top: 6px; }
  .upload-card input[type=file] { display: none; }

  /* UPLOAD BAR (estado colapsado, depois de ambos os ficheiros carregados) */
  .upload-bar { display: none; align-items: center; justify-content: space-between; gap: 12px; font-size: 12.5px; color: var(--text2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 8px 12px; margin-bottom: 1.5rem; background: var(--surface); }
  .upload-bar .ub-status { display: flex; align-items: center; gap: 6px; overflow: hidden; }
  .upload-bar .ub-status svg { width: 14px; height: 14px; color: var(--green-txt); flex-shrink: 0; }
  .upload-bar .ub-files { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .upload-bar button.ub-switch { background: none; border: none; padding: 0; font: inherit; font-size: 12.5px; color: var(--blue-txt); cursor: pointer; text-decoration: underline; text-underline-offset: 2px; flex-shrink: 0; }
  .upload-bar button.ub-switch:hover { color: var(--text); }

  /* SEARCH MODE TOGGLE */
  .mode-toggle { display: flex; gap: 4px; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); padding: 4px; margin-bottom: 10px; }
  .mode-btn { flex: 1; border: none; background: none; padding: 8px 10px; font: inherit; font-size: 13px; font-weight: 600; color: var(--text2); border-radius: var(--radius-sm); cursor: pointer; transition: background 0.15s, color 0.15s; }
  .mode-btn:hover { color: var(--text); }
  .mode-btn.active { background: var(--surface); color: var(--blue-txt); box-shadow: 0 1px 2px rgba(0,0,0,0.06); }
  .mode-btn:disabled { cursor: not-allowed; opacity: 0.6; }

  /* SEARCH */
  .search-wrap { position: relative; margin-bottom: 1.5rem; }
  .search-wrap svg.icon-search { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); width: 18px; height: 18px; color: var(--text3); pointer-events: none; }
  #search-input-artigo, #search-input-super { width: 100%; padding: 10px 40px 10px 40px; font-size: 15px; border: 1px solid var(--border2); border-radius: var(--radius); background: var(--surface); color: var(--text); outline: none; transition: border-color 0.15s, box-shadow 0.15s; }
  #search-input-artigo:focus, #search-input-super:focus { border-color: var(--blue-txt); box-shadow: 0 0 0 3px rgba(26,79,160,0.1); }
  #search-input-artigo:disabled, #search-input-super:disabled { background: var(--surface2); color: var(--text3); cursor: not-allowed; }
  #btn-clear { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: var(--text3); padding: 4px; display: none; border-radius: 99px; }
  #btn-clear:hover { color: var(--text); background: var(--surface2); }

  /* RESULTS */
  #results { display: none; }
  .results-header { font-size: 13px; color: var(--text2); margin-bottom: 12px; padding-bottom: 10px; border-bottom: 1px solid var(--border); }

  /* ARTIGO CARD */
  .artigo-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 14px; overflow: hidden; }
  .artigo-card-header { padding: 14px 18px; border-bottom: 1px solid var(--border); display: flex; align-items: flex-start; gap: 12px; }
  .cod-pill { background: var(--blue-bg); color: var(--blue-txt); font-size: 12px; font-weight: 600; padding: 4px 10px; border-radius: 99px; white-space: nowrap; font-family: 'Cascadia Code', 'Courier New', monospace; }
  .artigo-nome { font-size: 14px; font-weight: 600; color: var(--text); line-height: 1.4; }
  .artigo-card-body { padding: 14px 18px; display: flex; flex-direction: column; gap: 14px; }

  /* SECTION LABEL */
  .sec-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text3); margin-bottom: 8px; display: flex; align-items: center; gap: 5px; }

  /* ARM GRID */
  .arm-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 8px; }
  .arm-cell { background: var(--surface2); border-radius: var(--radius-sm); padding: 10px 12px; }
  .arm-cell-name { font-size: 11px; color: var(--text2); margin-bottom: 3px; }
  .arm-cell-pos { font-size: 14px; font-weight: 600; color: var(--text); font-family: 'Cascadia Code', 'Courier New', monospace; }
  .arm-cell-um { font-size: 11px; color: var(--text3); margin-top: 2px; }
  .arm-cell-obs { font-size: 11px; color: var(--amber-txt); background: var(--amber-bg); border-radius: 4px; padding: 2px 6px; margin-top: 4px; display: inline-block; }

  /* DIVIDER */
  .divider { border: none; border-top: 1px solid var(--border); }

  /* SUPER TAGS */
  .super-tags { display: flex; flex-wrap: wrap; gap: 6px; }
  .super-tag { background: var(--amber-bg); color: var(--amber-txt); font-size: 12px; font-weight: 500; padding: 4px 10px; border-radius: 99px; }
  .super-group { margin-bottom: 10px; }
  .super-group:last-child { margin-bottom: 0; }
  .super-group-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text3); margin-bottom: 6px; }

  /* INFO PANEL */
  .info-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
  .info-card { border-radius: var(--radius-sm); padding: 12px 14px; }
  .info-card.blue  { background: var(--blue-bg); }
  .info-card.green { background: var(--green-bg); }
  .info-card.amber { background: var(--amber-bg); }
  .info-card-title { font-size: 10.5px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; }
  .info-card.blue  .info-card-title { color: var(--blue-txt); }
  .info-card.green .info-card-title { color: var(--green-txt); }
  .info-card.amber .info-card-title { color: var(--amber-txt); }
  .info-card-num { font-size: 22px; font-weight: 700; color: var(--text); line-height: 1.1; margin-bottom: 6px; }
  .info-card-detail { font-size: 12px; color: var(--text2); line-height: 1.5; word-break: break-word; }

  @media (max-width: 600px) {
    .info-grid { grid-template-columns: 1fr; }
  }

  /* CAIXAS TABLE */
  .cx-wrap { overflow-x: auto; }
  table.cx { width: 100%; border-collapse: collapse; font-size: 13px; }
  table.cx th { text-align: left; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text3); padding: 4px 10px 6px 0; border-bottom: 1px solid var(--border); }
  table.cx td { padding: 7px 10px 7px 0; border-bottom: 1px solid var(--border); color: var(--text); vertical-align: middle; }
  table.cx tr:last-child td { border-bottom: none; }
  table.cx td.mono { font-family: 'Cascadia Code', 'Courier New', monospace; font-weight: 600; }
  table.cx td.muted { color: var(--text2); }
  .badge-total { background: var(--blue-bg); color: var(--blue-txt); font-size: 12px; font-weight: 600; padding: 2px 8px; border-radius: 99px; font-family: 'Cascadia Code', 'Courier New', monospace; }

  /* CAIXAS POR GRUPO (HPH / ACES) */
  .cxgrp-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; }
  .cxgrp-col { background: var(--surface2); border-radius: var(--radius-sm); padding: 10px 12px; }
  .cxgrp-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text2); margin-bottom: 8px; }
  .cxgrp-row { display: flex; align-items: center; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid var(--border); }
  .cxgrp-row:last-child { border-bottom: none; }
  .cxgrp-tipo { font-family: 'Cascadia Code', 'Courier New', monospace; font-weight: 600; font-size: 13px; color: var(--text); }

  /* EMPTY */
  .no-data { color: var(--text3); font-size: 13px; font-style: italic; }
  .empty-state { text-align: center; padding: 4rem 1rem; color: var(--text3); }
  .empty-state svg { width: 44px; height: 44px; margin: 0 auto 12px; display: block; opacity: 0.4; }
  .empty-state p { font-size: 14px; }

  @media (max-width: 600px) {
    .upload-grid { grid-template-columns: 1fr; }
    header { padding: 0 1rem; }
    .container { padding: 1.5rem 1rem; }
  }
</style>
</head>
<body>

<header>
  <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color:#1a4fa0"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>
  <h1>Consulta de Artigos</h1>
  <div class="sep"></div>
  <span class="subtitle">Armazém · Posição · Supermercados · Caixas</span>
  <span class="version">v1.6.0</span>
</header>

<div class="container">

  <!-- UPLOAD -->
  <div id="upload-section">
    <div class="upload-grid">
      <div class="upload-card" id="z-super" onclick="document.getElementById('f-super').click()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/><line x1="9" y1="9" x2="9" y2="21"/></svg>
        <div class="uc-title">T_supermercados</div>
        <div class="uc-sub">Supermercados / Kanbans</div>
        <div class="uc-count" id="count-super" style="display:none"></div>
        <input type="file" id="f-super" accept=".xlsx" onchange="loadFile(this,'super')">
      </div>
      <div class="upload-card" id="z-arm" onclick="document.getElementById('f-arm').click()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        <div class="uc-title">Consumo</div>
        <div class="uc-sub">Armazém / Posições</div>
        <div class="uc-count" id="count-arm" style="display:none"></div>
        <input type="file" id="f-arm" accept=".xlsx" onchange="loadFile(this,'arm')">
      </div>
    </div>
  </div>

  <!-- UPLOAD BAR (visível só depois de ambos os ficheiros estarem carregados) -->
  <div class="upload-bar" id="upload-bar">
    <span class="ub-status">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="9 12 11 14 15 10"/></svg>
      <span class="ub-files" id="ub-files"></span>
    </span>
    <button class="ub-switch" onclick="showUploadSection()">Trocar ficheiros</button>
  </div>

  <!-- SEARCH MODE -->
  <div class="mode-toggle">
    <button type="button" class="mode-btn active" id="mode-btn-artigo" onclick="setSearchMode('artigo')" disabled>Artigos</button>
    <button type="button" class="mode-btn" id="mode-btn-super" onclick="setSearchMode('super')" disabled>Supermercados / Serviços</button>
  </div>

  <!-- SEARCH -->
  <div class="search-wrap">
    <svg class="icon-search" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input type="text" id="search-input-artigo" placeholder="Pesquisar por código ou descrição do artigo…" oninput="onSearchInput()" disabled>
    <input type="text" id="search-input-super" placeholder="Pesquisar por supermercado ou serviço (código ou descrição)…" oninput="onSearchInput()" disabled style="display:none">
    <button id="btn-clear" onclick="clearSearch()" title="Limpar pesquisa">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </div>

  <!-- RESULTS -->
  <div id="results">
    <div class="results-header" id="results-header"></div>
    <div id="cards-container"></div>
  </div>

</div>

<script>
// ── State ──────────────────────────────────────────────
let superMap = {};   // cod → { nome, supermercados[], caixas[] }
let armMap   = {};   // cod → { descArtigo, posicoes[] }
let superLoaded = false, armLoaded = false;

// ── File loading ───────────────────────────────────────
function loadFile(input, tipo) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const wb  = XLSX.read(e.target.result, { type: 'array' });
    const ws  = wb.Sheets[wb.SheetNames[0]];
    const raw = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '' });
    let hRow  = -1;
    for (let i = 0; i < Math.min(10, raw.length); i++) {
      if (raw[i].filter(c => String(c).trim().length > 2).length > 3) { hRow = i; break; }
    }
    if (hRow === -1) { alert('Não foi possível ler o ficheiro. Verifique o formato.'); return; }
    const headers = raw[hRow].map(c => String(c).trim());
    const rows    = raw.slice(hRow + 1).filter(r => r.some(c => String(c).trim()));
    if (tipo === 'super') processSuperFile(headers, rows, file.name);
    else                  processArmFile(headers, rows, file.name);
  };
  reader.readAsArrayBuffer(file);
}

// Prefere correspondência EXATA do cabeçalho; só recorre a substring se não
// houver exata. Sem isto, procurar "Artigo" apanhava "Código Artigo" (porque
// contém "artigo"), e "Supermercado" apanhava "Código Supermercado".
function col(headers, terms) {
  for (const t of terms) {
    const i = headers.findIndex(h => h.toLowerCase() === t.toLowerCase());
    if (i !== -1) return i;
  }
  for (const t of terms) {
    const i = headers.findIndex(h => h.toLowerCase().includes(t.toLowerCase()));
    if (i !== -1) return i;
  }
  return -1;
}

function v(row, i) { return i !== -1 ? String(row[i] || '').trim() : ''; }
function n(row, i) { return i !== -1 && row[i] !== '' ? row[i] : ''; }

// Classifica o valor da coluna "Local" em HPH, ACES ou Outro. Feito por
// palavra-chave (não exato) para tolerar variações tipo "HPH Braga" ou
// "ACES Porto Oriental".
function classificaLocal(local) {
  const l = local.toUpperCase();
  if (l.includes('ACES')) return 'ACES';
  if (l.includes('HPH'))  return 'HPH';
  return 'Outro';
}

function processSuperFile(headers, rows, fname) {
  const iCod    = col(headers, ['Código Artigo', 'Codigo Artigo']);
  const iNome   = col(headers, ['Artigo']);
  const iSuper  = col(headers, ['Supermercado']);
  const iCodS   = col(headers, ['Código Supermercado', 'Codigo Supermercado']);
  const iServ   = col(headers, ['Serviço', 'Servico']);
  const iCodServ= col(headers, ['Código Serviço', 'Codigo Servico', 'Codigo Servico']);
  const iLocal  = col(headers, ['Local']);
  const iTipoCx = col(headers, ['Tipo Caixa']);
  const iNrCx   = col(headers, ['Nº Caixas', 'Nr Caixas', 'Numero Caixas']);
  const iQtdCx  = col(headers, ['Quantidade Caixa']);
  const iQtdTot = col(headers, ['Quantidade Total']);

  superMap = {};
  rows.forEach(r => {
    const cod = v(r, iCod);
    if (!cod) return;
    if (!superMap[cod]) superMap[cod] = { nome: '', supermercados: [], servicos: [], caixas: [] };
    const nome = v(r, iNome);
    if (nome && !superMap[cod].nome) superMap[cod].nome = nome;
    const sNome = v(r, iSuper), sCod = v(r, iCodS), sLocal = v(r, iLocal);
    if (sNome && !superMap[cod].supermercados.find(s => s.nome === sNome))
      superMap[cod].supermercados.push({ cod: sCod, nome: sNome, local: sLocal, grupo: classificaLocal(sLocal) });
    const servNome = v(r, iServ), servCod = v(r, iCodServ);
    if (servNome && !superMap[cod].servicos.find(sv => sv.nome === servNome))
      superMap[cod].servicos.push({ cod: servCod, nome: servNome });
    const tipoCx = v(r, iTipoCx);
    if (tipoCx) {
      // Guarda a linha "em bruto"; a agregação (máximo por tipo+supermercado)
      // é feita depois por aggregateCaixas, pois o export pode ter mais que
      // uma linha para a mesma combinação tipo de caixa + supermercado.
      superMap[cod].caixas.push({ tipoCx, qtdCx: n(r, iQtdCx), nrCx: n(r, iNrCx), qtdTotal: n(r, iQtdTot), superNome: sNome, grupo: classificaLocal(sLocal) });
    }
  });

  // Colapsa duplicados: para cada (tipo de caixa, supermercado) fica só a
  // linha com a maior Quantidade Total — "quantidade máxima por tipo de caixa".
  Object.values(superMap).forEach(a => { a.caixas = aggregateCaixas(a.caixas); });

  superLoaded = true;
  markLoaded('z-super', 'count-super', fname, Object.keys(superMap).length + ' artigos', 'super');
  checkReady();
}

// Colapsa linhas duplicadas por (tipoCx, superNome), mantendo a de maior
// Quantidade Total.
function aggregateCaixas(rows) {
  const byKey = new Map();
  for (const r of rows) {
    const key = r.tipoCx + '|' + r.superNome;
    const atual = byKey.get(key);
    const total = Number(r.qtdTotal) || 0;
    if (!atual || total > (Number(atual.qtdTotal) || 0)) byKey.set(key, r);
  }
  return [...byKey.values()];
}

// Soma, por supermercado, os totais já agregados (máximos) de cada tipo de
// caixa — "quantidade total por supermercado".
function totaisPorSupermercado(caixasAgregadas) {
  const totais = {};
  for (const c of caixasAgregadas) {
    totais[c.superNome] = (totais[c.superNome] || 0) + (Number(c.qtdTotal) || 0);
  }
  return totais;
}

// Supermercado com o maior total agregado — usado no cartão "Maior total
// por supermercado" do resumo.
function maiorTotalSupermercado(totais) {
  let nome = '', valor = -1;
  for (const [k, v] of Object.entries(totais)) {
    if (v > valor) { nome = k; valor = v; }
  }
  return valor >= 0 ? { nome, valor } : null;
}
// Lista (sem duplicados) dos tipos de caixa que o artigo tem, ordenada
// alfabeticamente — usada no cartão "Tipos de caixa" do resumo.
function tiposDeCaixa(caixasAgregadas) {
  const vistos = new Set();
  const lista = [];
  for (const c of caixasAgregadas) {
    if (!vistos.has(c.tipoCx)) { vistos.add(c.tipoCx); lista.push(c.tipoCx); }
  }
  return lista.sort((a, b) => a.localeCompare(b, 'pt'));
}

// Para cada grupo (HPH / ACES / Outro), a maior "Quantidade Total" de cada
// tipo de caixa entre os supermercados desse grupo, ordenada alfabeticamente
// por tipo — usada na secção "Caixas por supermercado", agora organizada
// por grupo.
function maxPorTipoEGrupo(caixasAgregadas) {
  const porGrupo = {};
  for (const c of caixasAgregadas) {
    if (!porGrupo[c.grupo]) porGrupo[c.grupo] = new Map();
    const val = Number(c.qtdTotal) || 0;
    const atual = porGrupo[c.grupo].get(c.tipoCx) || 0;
    if (val > atual) porGrupo[c.grupo].set(c.tipoCx, val);
  }
  const resultado = {};
  for (const [grupo, mapa] of Object.entries(porGrupo)) {
    resultado[grupo] = [...mapa.entries()]
      .map(([tipo, max]) => ({ tipo, max }))
      .sort((a, b) => a.tipo.localeCompare(b.tipo, 'pt'));
  }
  return resultado;
}
function processArmFile(headers, rows, fname) {
  const iCod      = col(headers, ['Código Artigo', 'Codigo Artigo']);
  const iDescArt  = col(headers, ['Descrição Artigo', 'Descricao Artigo']);
  const iCodArm   = col(headers, ['Código Armazém', 'Codigo Armazem']);
  const iNomeArm  = col(headers, ['Descrição Armazém', 'Descricao Armazem', 'Armazém']);
  const iZona     = col(headers, ['Zona']);
  const iDescZona = col(headers, ['Descrição Zona', 'Descricao Zona']);
  const iUM       = col(headers, ['Unidade de Medida']);
  const iObs      = col(headers, ['Obs']);

  armMap = {};
  rows.forEach(r => {
    const cod = v(r, iCod);
    if (!cod) return;
    if (!armMap[cod]) armMap[cod] = { descArtigo: '', posicoes: [] };
    const desc = v(r, iDescArt);
    if (desc && !armMap[cod].descArtigo) armMap[cod].descArtigo = desc;
    const entry = { codArm: v(r, iCodArm), nomeArm: v(r, iNomeArm), zona: v(r, iZona), descZona: v(r, iDescZona), um: v(r, iUM), obs: v(r, iObs) };
    if (entry.nomeArm && !armMap[cod].posicoes.find(p => p.nomeArm === entry.nomeArm && p.descZona === entry.descZona))
      armMap[cod].posicoes.push(entry);
  });

  armLoaded = true;
  markLoaded('z-arm', 'count-arm', fname, Object.keys(armMap).length + ' artigos', 'arm');
  checkReady();
}

// Guarda o resumo de cada ficheiro ("nome — X artigos") para compor o texto
// da barra colapsada quando ambos estiverem carregados.
let uploadLabels = { super: '', arm: '' };

function markLoaded(zoneId, countId, fname, info, tipo) {
  const zone = document.getElementById(zoneId);
  zone.classList.add('loaded');
  zone.onclick = null;
  const countEl = document.getElementById(countId);
  const label = fname.split('/').pop() + ' — ' + info;
  countEl.textContent = '✓ ' + label;
  countEl.style.display = 'block';
  uploadLabels[tipo] = label;
}

function checkReady() {
  if (superLoaded && armLoaded) {
    const inp = document.getElementById(activeSearchInputId());
    document.getElementById('mode-btn-artigo').disabled = false;
    document.getElementById('mode-btn-super').disabled = false;
    inp.disabled = false;
    document.getElementById('search-input-artigo').disabled = false;
    document.getElementById('search-input-super').disabled = false;
    inp.focus();
    // Com os dois ficheiros carregados, a zona de upload deixa de fazer
    // falta no ecrã — colapsa numa barra fina para dar mais espaço aos
    // resultados. "Trocar ficheiros" reabre-a sem perder os dados já lidos.
    document.getElementById('ub-files').textContent = uploadLabels.super + '  ·  ' + uploadLabels.arm;
    document.getElementById('upload-section').style.display = 'none';
    document.getElementById('upload-bar').style.display = 'flex';
  }
}

// ── Search mode (Artigos vs Supermercados/Serviços) ─────
// Cada modo tem a sua própria caixa de texto; só uma está visível de cada
// vez. Trocar de modo limpa o texto e os resultados do modo anterior, para
// não ficar a mostrar resultados de um tipo de pesquisa diferente.
let searchMode = 'artigo';

function activeSearchInputId() {
  return searchMode === 'artigo' ? 'search-input-artigo' : 'search-input-super';
}

function setSearchMode(mode) {
  if (mode === searchMode) return;
  searchMode = mode;

  document.getElementById('mode-btn-artigo').classList.toggle('active', mode === 'artigo');
  document.getElementById('mode-btn-super').classList.toggle('active', mode === 'super');
  document.getElementById('search-input-artigo').style.display = mode === 'artigo' ? 'block' : 'none';
  document.getElementById('search-input-super').style.display  = mode === 'super'  ? 'block' : 'none';

  document.getElementById('search-input-artigo').value = '';
  document.getElementById('search-input-super').value = '';
  document.getElementById('btn-clear').style.display = 'none';
  document.getElementById('results').style.display = 'none';
  document.getElementById('cards-container').innerHTML = '';

  const inp = document.getElementById(activeSearchInputId());
  if (!inp.disabled) inp.focus();
}

// Reabre a zona de upload para permitir trocar um ou os dois ficheiros.
// Não apaga os dados já carregados: se só se substituir um ficheiro, o
// outro continua disponível para pesquisa.
function showUploadSection() {
  document.getElementById('upload-section').style.display = 'block';
  document.getElementById('upload-bar').style.display = 'none';
}

// Remove acentos para tornar a comparação mais tolerante (ex: "Povoa"
// encontra "Póvoa"). Também baixa para minúsculas.
function normaliza(s) {
  return String(s || '').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
}

// ── Search ─────────────────────────────────────────────
function getNome(cod) {
  return (superMap[cod] && superMap[cod].nome) || (armMap[cod] && armMap[cod].descArtigo) || '';
}

// Verifica se algum supermercado associado ao artigo bate com o termo de
// pesquisa, pelo código ou pela descrição.
function superBate(cod, q) {
  const supers = (superMap[cod] && superMap[cod].supermercados) || [];
  return supers.some(sv =>
    (sv.nome && normaliza(sv.nome).includes(q)) ||
    (sv.cod  && normaliza(sv.cod).includes(q))
  );
}

// Verifica se algum serviço associado ao artigo bate com o termo de
// pesquisa, pelo código ou pela descrição.
function servicoBate(cod, q) {
  const servicos = (superMap[cod] && superMap[cod].servicos) || [];
  return servicos.some(sv =>
    (sv.nome && normaliza(sv.nome).includes(q)) ||
    (sv.cod  && normaliza(sv.cod).includes(q))
  );
}

// Modo "Artigos": encontra só por código ou descrição do artigo — nunca
// por supermercado ou serviço.
function matchArtigo(cod, q) {
  return normaliza(cod).includes(q) || normaliza(getNome(cod)).includes(q);
}

// Modo "Supermercados / Serviços": encontra só por supermercado ou serviço
// associado ao artigo — nunca por código/descrição do artigo em si.
function matchSuperServico(cod, q) {
  return superBate(cod, q) || servicoBate(cod, q);
}

// Debounce: espera que a pessoa pare de escrever por 150ms antes de
// pesquisar. Com milhares de linhas, evita recalcular a cada tecla premida
// muito depressa (ex: ao colar texto ou escrever rápido).
let searchTimer = null;
function onSearchInput() {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(doSearch, 150);
}

// Com poucos caracteres, uma pesquisa em milhares de linhas devolve
// demasiados resultados para ser útil (ex: "m" sozinho pode encontrar quase
// tudo). Por isso só se pesquisa a partir de 2 caracteres.
const MIN_CHARS = 2;

function doSearch() {
  const qRaw = document.getElementById(activeSearchInputId()).value.trim();
  const q = normaliza(qRaw);
  document.getElementById('btn-clear').style.display = qRaw ? 'inline-flex' : 'none';

  if (!q) { document.getElementById('results').style.display = 'none'; return; }

  if (q.length < MIN_CHARS) {
    document.getElementById('results').style.display = 'block';
    document.getElementById('results-header').textContent = `Escreve pelo menos ${MIN_CHARS} caracteres…`;
    document.getElementById('cards-container').innerHTML = '';
    return;
  }

  const matchFn  = searchMode === 'artigo' ? matchArtigo : matchSuperServico;
  const allCods = [...new Set([...Object.keys(superMap), ...Object.keys(armMap)])];
  const found   = allCods.filter(cod => matchFn(cod, q));

  document.getElementById('results').style.display = 'block';
  document.getElementById('results-header').textContent = found.length
    ? found.length + ' resultado(s) encontrado(s)' + (found.length > 30 ? ' — mostrando os primeiros 30' : '')
    : '';

  const container = document.getElementById('cards-container');
  if (!found.length) {
    container.innerHTML = `<div class="empty-state">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
      <p>Nenhum artigo encontrado para "<strong>${escHtml(qRaw)}</strong>"</p>
    </div>`;
    return;
  }
  container.innerHTML = found.slice(0, 30).map(renderCard).join('');
}

function clearSearch() {
  clearTimeout(searchTimer);
  document.getElementById(activeSearchInputId()).value = '';
  document.getElementById('btn-clear').style.display = 'none';
  document.getElementById('results').style.display = 'none';
  document.getElementById(activeSearchInputId()).focus();
}

// ── Render ─────────────────────────────────────────────
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderCard(cod) {
  const s    = superMap[cod] || { supermercados: [], caixas: [] };
  const a    = armMap[cod]   || { posicoes: [] };
  const nome = getNome(cod);

  // ── Armazém block ──
  const armHTML = a.posicoes.length
    ? `<div class="arm-grid">${a.posicoes.map(p => `
        <div class="arm-cell">
          <div class="arm-cell-name">${escHtml(p.nomeArm || p.codArm)}</div>
          <div class="arm-cell-pos">${escHtml(p.descZona || p.zona || '—')}</div>
          ${p.um  ? `<div class="arm-cell-um">UM: ${escHtml(p.um)}</div>` : ''}
          ${p.obs ? `<div class="arm-cell-obs">${escHtml(p.obs)}</div>` : ''}
        </div>`).join('')}</div>`
    : '<span class="no-data">Sem dados de armazém</span>';

  // ── Supermercados block (agrupado por Local: HPH / ACES / Outro) ──
  let superHTML = '<span class="no-data">Não associado a supermercados</span>';
  if (s.supermercados.length) {
    const ordem = ['HPH', 'ACES', 'Outro'];
    const grupos = {};
    s.supermercados.forEach(sv => {
      if (!grupos[sv.grupo]) grupos[sv.grupo] = [];
      grupos[sv.grupo].push(sv);
    });
    superHTML = ordem.filter(g => grupos[g] && grupos[g].length).map(g => `
      <div class="super-group">
        <div class="super-group-label">${escHtml(g)} (${grupos[g].length})</div>
        <div class="super-tags">${grupos[g].map(sv =>
          `<span class="super-tag" title="${sv.local ? 'Local: ' + escHtml(sv.local) : ''}">${escHtml(sv.nome)}</span>`
        ).join('')}</div>
      </div>`).join('');
  }

  // ── Serviços block (lista simples, sem agrupamento HPH/ACES) ──
  const servicosHTML = (s.servicos && s.servicos.length)
    ? `<div class="super-tags">${s.servicos.map(sv =>
        `<span class="super-tag">${escHtml(sv.nome)}</span>`
      ).join('')}</div>`
    : '<span class="no-data">Não associado a serviços</span>';

  // ── Caixas por grupo (HPH / ACES / Outro) ──
  let cxHTML = '';
  if (s.caixas.length) {
    const porGrupo = maxPorTipoEGrupo(s.caixas);
    const ordemGrupos = ['HPH', 'ACES', 'Outro'];
    const colunas = ordemGrupos
      .filter(g => porGrupo[g] && porGrupo[g].length)
      .map(g => `
        <div class="cxgrp-col">
          <div class="cxgrp-title">${escHtml(g)}</div>
          ${porGrupo[g].map(t => `
            <div class="cxgrp-row">
              <span class="cxgrp-tipo">${escHtml(t.tipo)}</span>
              <span class="badge-total">${escHtml(t.max)}</span>
            </div>`).join('')}
        </div>`).join('');
    cxHTML = `
      <div>
        <div class="sec-label">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/></svg>
          Caixas por supermercado
        </div>
        <div class="cxgrp-grid">${colunas}</div>
      </div>`;
  }

  // ── Painel "Informação importante" ──
  let infoHTML = '';
  if (s.supermercados.length || s.caixas.length) {
    const tipos  = tiposDeCaixa(s.caixas);
    const totais = totaisPorSupermercado(s.caixas);
    const maior  = maiorTotalSupermercado(totais);

    // Contagem de supermercados por grupo (HPH / ACES / Outro)
    const contagemGrupos = {};
    s.supermercados.forEach(sv => { contagemGrupos[sv.grupo] = (contagemGrupos[sv.grupo] || 0) + 1; });
    const ordemGrupos = ['HPH', 'ACES', 'Outro'];
    const listaGrupos = ordemGrupos
      .filter(g => contagemGrupos[g])
      .map(g => `${contagemGrupos[g]} ${escHtml(g)}`)
      .join(', ') || '—';

    const listaTipos = tipos.length ? tipos.map(escHtml).join(', ') : '—';

    infoHTML = `
      <div>
        <div class="sec-label">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
          Informação importante
        </div>
        <div class="info-grid">
          <div class="info-card blue">
            <div class="info-card-title">Supermercados com artigo</div>
            <div class="info-card-num">${s.supermercados.length}</div>
            <div class="info-card-detail">${listaGrupos}</div>
          </div>
          <div class="info-card green">
            <div class="info-card-title">Tipos de caixa</div>
            <div class="info-card-num">${tipos.length}</div>
            <div class="info-card-detail">${listaTipos}</div>
          </div>
          <div class="info-card amber">
            <div class="info-card-title">Maior total por supermercado</div>
            <div class="info-card-num">${maior ? escHtml(maior.valor) : '—'}</div>
            <div class="info-card-detail">${maior ? escHtml(maior.nome) : '—'}</div>
          </div>
        </div>
      </div>
      <hr class="divider">`;
  }

  return `<div class="artigo-card">
    <div class="artigo-card-header">
      <span class="cod-pill">${escHtml(cod)}</span>
      <span class="artigo-nome">${escHtml(nome || '—')}</span>
    </div>
    <div class="artigo-card-body">
      ${infoHTML}
      <div>
        <div class="sec-label">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
          Armazém e posição
        </div>
        ${armHTML}
      </div>
      ${cxHTML ? `<hr class="divider">${cxHTML}` : ''}
      <hr class="divider">
      <div>
        <div class="sec-label">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
          Supermercados
        </div>
        ${superHTML}
      </div>
      <hr class="divider">
      <div>
        <div class="sec-label">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          Serviços
        </div>
        ${servicosHTML}
      </div>
    </div>
  </div>`;
}
</script>
</body>
</html>
